<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Bicol IP Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="auth-page">
  <div class="auth-shell">
    <div class="auth-card">
      <a href="index.html" class="back-link">← Back to Home</a>
      <h2>Create your account</h2>
      <p class="hint">Access across devices with the same credentials.</p>
      <form id="signupForm" class="form">
        <label>Username</label>
        <input type="text" id="usernameInput" placeholder="Your name" required />
        <label>Phone Number</label>
        <input type="tel" id="phoneInput" placeholder="+63 9XX XXX XXXX" required />
        <label>Birthdate</label>
        <input type="date" id="birthdateInput" required />
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" required />
        <label>Password</label>
        <div class="password-field">
          <input type="password" id="passwordInput" placeholder="????????" required />
          <button type="button" class="toggle-pass" id="toggleSignupPass" aria-label="Show password">Show</button>
        </div>
        <button type="submit" class="solid full">Create Account</button>
        <p class="hint">Already have an account? <a href="index.html">Login</a></p>
      </form>
      <div id="signupToast" class="toast hidden"></div>
    </div>
  </div>
  <script type="module" src="./signup.js"></script>
</body>
</html>
